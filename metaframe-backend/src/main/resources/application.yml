# - Role: Defines runtime configuration values.
# - Notes: This file supplies shared settings for application startup.

server:
  port: ${METAFRAME_SERVER_PORT:4300}

spring:
  config:
    # IntelliJ bootRun can pick up a local .env file without extra VM options.
    import: optional:file:.env[.properties]
  application:
    name: metaframe-backend
  datasource:
    # PostgreSQL is the canonical runtime store, so local Run still needs a reachable DB.
    url: ${METAFRAME_DB_URL:jdbc:postgresql://127.0.0.1:5432/metaframe}
    username: ${METAFRAME_DB_USERNAME:metaframe}
    password: ${METAFRAME_DB_PASSWORD:metaframe}
  jackson:
    serialization:
      write-dates-as-timestamps: false
  flyway:
    enabled: true
    locations: classpath:db/migration

metaframe:
  cors:
    allowed-origins: ${METAFRAME_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
  auth:
    session-hours: ${METAFRAME_AUTH_SESSION_HOURS:12}
